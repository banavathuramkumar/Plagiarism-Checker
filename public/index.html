<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plagiarism Checker | Document Similarity</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container">
        <header>
            <h1>Plagiarism <span class="highlight-title">Checker</span></h1>
            <p>Detect document similarity using the Longest Common Subsequence (LCS) algorithm.</p>
        </header>

        <main>
            <div class="upload-section">
                <div class="file-upload" id="upload-doc1">
                    <label for="doc1-input">
                        <div class="upload-content">
                            <span class="icon">📄</span>
                            <span class="text">Upload Document 1</span>
                            <span class="filename" id="doc1-filename">No file selected</span>
                        </div>
                    </label>
                    <input type="file" id="doc1-input" accept=".txt,.md,.js,.py,.html,.css,.json,.csv" />
                </div>
                
                <div class="file-upload" id="upload-doc2">
                    <label for="doc2-input">
                        <div class="upload-content">
                            <span class="icon">📄</span>
                            <span class="text">Upload Document 2</span>
                            <span class="filename" id="doc2-filename">No file selected</span>
                        </div>
                    </label>
                    <input type="file" id="doc2-input" accept=".txt,.md,.js,.py,.html,.css,.json,.csv" />
                </div>
            </div>

            <div class="action-section">
                <button id="compare-btn" disabled>
                    <span>Analyze Similarity</span>
                    <div class="spinner" id="loading-spinner"></div>
                </button>
            </div>

            <div class="results-section hidden" id="results-container">
                <div class="score-card">
                    <h2>Similarity Score</h2>
                    <div class="score-ring">
                        <svg viewBox="0 0 36 36" class="circular-chart">
                            <path class="circle-bg"
                                d="M18 2.0845
                                a 15.9155 15.9155 0 0 1 0 31.831
                                a 15.9155 15.9155 0 0 1 0 -31.831"
                            />
                            <path class="circle" id="score-circle"
                                stroke-dasharray="0, 100"
                                d="M18 2.0845
                                a 15.9155 15.9155 0 0 1 0 31.831
                                a 15.9155 15.9155 0 0 1 0 -31.831"
                            />
                            <text x="18" y="20.35" class="percentage" id="score-text">0%</text>
                        </svg>
                    </div>
                </div>

                <div class="documents-display">
                    <div class="doc-panel">
                        <h3>Document 1</h3>
                        <div class="content-box" id="doc1-content"></div>
                    </div>
                    <div class="doc-panel">
                        <h3>Document 2</h3>
                        <div class="content-box" id="doc2-content"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
